name: Backup Supabase

on:
  schedule:
    # Roda todo dia às 20:00 horário de Brasília (23:00 UTC)
    - cron: "0 23 * * *"
  workflow_dispatch:
    # Botão "Run workflow" manual no GitHub Actions

jobs:
  backup:
    name: Dump PostgreSQL → Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Instala o cliente PostgreSQL ─────────────────────────────────────
      - name: Instalar postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      # ── 2. Desabilita IPv6 — GitHub Actions não roteia IPv6 ao Supabase ─────
      - name: Forçar IPv4
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1

      # ── 3. Gera o backup com data no nome ───────────────────────────────────
      - name: Gerar backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          FILENAME="backup-${DATE}.sql"

          pg_dump "$SUPABASE_DB_URL" \
            --format=plain \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            > "$FILENAME"

          echo "Backup gerado: $FILENAME ($(du -sh $FILENAME | cut -f1))"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV

      # ── 4. Salva o arquivo como Artifact no GitHub (retido por 90 dias) ─────
      - name: Salvar backup como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
          if-no-files-found: error
