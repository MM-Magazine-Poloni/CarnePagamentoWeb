name: Backup Supabase

on:
  schedule:
    # Roda todo dia às 20:00 horário de Brasília (23:00 UTC)
    - cron: "0 23 * * *"
  workflow_dispatch:
    # Permite rodar manualmente

jobs:
  backup:
    name: Dump PostgreSQL → Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Gerar backup
        env:
          # Injeta a senha na variável que o pg_dump reconhece nativamente
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          # Injeta a string de conexão formatada
          DB_CONN: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          FILENAME="backup-${DATE}.sql"
          
          echo "Iniciando dump forçado com String de Conexão..."

          # O uso de "$DB_CONN" entre aspas garante que o usuário completo seja lido
          pg_dump "$DB_CONN" \
            --format=plain \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            --file="$FILENAME"

          echo "Backup concluído com sucesso: $FILENAME"
          echo "Tamanho: $(du -sh $FILENAME | cut -f1)"
          
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Salvar backup como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.DATE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
          if-no-files-found: error
