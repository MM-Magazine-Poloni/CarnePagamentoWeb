name: Backup Supabase

on:
  schedule:
    # Roda todo dia às 20:00 horário de Brasília (23:00 UTC)
    - cron: "0 23 * * *"
  workflow_dispatch:
    # Permite rodar manualmente clicando no botão "Run workflow"

jobs:
  backup:
    name: Dump PostgreSQL → Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Gerar backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Define a data atual
          DATE=$(date -u +"%Y-%m-%d")
          FILENAME="backup-${DATE}.sql"
          
          echo "Iniciando dump do banco de dados..."

          # O uso de aspas duplas "$SUPABASE_DB_URL" garante que a string seja lida corretamente
          pg_dump "$SUPABASE_DB_URL" \
            --format=plain \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            --file="$FILENAME"

          echo "Backup concluído com sucesso: $FILENAME"
          echo "Tamanho do arquivo: $(du -sh $FILENAME | cut -f1)"
          
          # Exporta variáveis para os próximos passos
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Salvar backup como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.DATE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
          if-no-files-found: error
