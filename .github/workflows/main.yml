name: Backup Supabase

on:
  schedule:
    # Roda todo dia às 20:00 horário de Brasília (23:00 UTC)
    - cron: "0 23 * * *"
  workflow_dispatch:
    # Permite rodar manualmente pelo botão "Run workflow"

jobs:
  backup:
    name: Dump PostgreSQL → Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Setup do ambiente ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      # ── 2. Geração do Backup ────────────────────────────────────────────────
      - name: Gerar backup
        env:
          # O pg_dump usa automaticamente a variável PGPASSWORD para se autenticar
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          FILENAME="backup-${DATE}.sql"
          
          echo "Iniciando dump do banco de dados às $(date)..."

          # Executa o dump usando a URL (sem senha) e a variável PGPASSWORD
          pg_dump "$DB_URL" \
            --format=plain \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            --file="$FILENAME"

          echo "Backup concluído: $FILENAME"
          echo "Tamanho: $(du -sh $FILENAME | cut -f1)"
          
          # Salva variáveis para o próximo step
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      # ── 3. Upload do arquivo ────────────────────────────────────────────────
      - name: Salvar backup como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.DATE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
          if-no-files-found: error
