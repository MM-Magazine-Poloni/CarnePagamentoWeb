name: Backup Supabase

on:
  schedule:
    # Roda todo dia às 23:00 UTC (20:00 BRT)
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  backup:
    name: Dump PostgreSQL → Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Gerar backup
        env:
          # Sua URL: postgresql://postgres:[SENHA]@db.vmdphnhyrcysnontccbs.supabase.co:5432/postgres
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          FILENAME="backup-${DATE}.sql"
          
          echo "Iniciando dump para $FILENAME..."

          # EXPLICACAO: Adicionamos ?sslmode=require para garantir a conexão segura
          # e usamos o pg_dump apontando diretamente para a string de conexão.
          
          pg_dump "$SUPABASE_DB_URL" \
            --format=plain \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            --file="$FILENAME"

          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Salvar backup como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.DATE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
